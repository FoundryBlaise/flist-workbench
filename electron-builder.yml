appId: net.aiart-foundry.flist-workbench
productName: F-list Workbench
copyright: Copyright (c) 2026 Foundry Blaise
directories:
  output: dist-electron
  buildResources: build-resources
files:
  - out/**/*
  - package.json
  - "!**/*.map"
  - "!**/node_modules/**/{test,__tests__,tests}/**"
extraResources:
  - from: resources/sidecar.exe
    to: sidecar.exe
asar: true
# Native modules can't be dlopen()ed from inside an asar archive — the
# OS loader has no way to mmap a `.node` file out of a zip. Unpack
# keytar so its prebuilt binary lives on disk where Node can require()
# it. The pattern is glob-on-asar, not a filesystem glob — keytar
# itself is small, so unpacking the whole package is simpler than
# trying to surgically include just the .node file.
asarUnpack:
  - node_modules/keytar/**
# Lets electron-builder emit latest.yml alongside artifacts so
# electron-updater can read it from GitHub Releases. The workflow
# still uploads the release; this block just shapes the metadata.
publish:
  provider: github
  owner: FoundryBlaise
  repo: flist-workbench
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}-${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: F-list Workbench
  artifactName: ${productName}-${version}-${arch}-Setup.${ext}
portable:
  artifactName: ${productName}-${version}-${arch}-portable.${ext}
